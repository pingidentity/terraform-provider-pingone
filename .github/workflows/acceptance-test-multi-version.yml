# This pipeline runs parallel sets of tests:
#   - the known flaky tests until they can be properly triaged and corrected 
#     through API improvements, test improvements, and so on
#   - tests in which the flaky tests are skipped, for a "clean job" run
# All flaky tests expect the TESTACC_FLAKY environment variable set to true
# in order to be executed.
name: Multi-version Acceptance Tests
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 14,28 * *'
jobs:
  # ensure the code builds...
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
        id: go

      - name: Get dependencies
        run: |
          go mod download

      - name: Build
        run: |
          make build

  # prepare the environment
  prepare:
    name: Prepare Environment
    needs: build
    runs-on: ubuntu-latest

    env:
      PINGONE_TESTING_PROVIDER_VERSION: test
      PINGONE_CLIENT_ID: ${{ vars.PINGONE_PROD_EU_CLIENT_ID_CLIENT_SECRET_BASIC }}
      PINGONE_CLIENT_SECRET: ${{ secrets.PINGONE_PROD_EU_CLIENT_SECRET_CLIENT_SECRET_BASIC }}
      PINGONE_ENVIRONMENT_ID: ${{ vars.PINGONE_PROD_EU_ENVIRONMENT_ID }}
      PINGONE_REGION_CODE: "EU"
      PINGONE_LICENSE_ID: ${{ vars.PINGONE_PROD_EU_LICENSE_ID }}
      PINGONE_ORGANIZATION_ID: ${{ vars.PINGONE_PROD_EU_ORG_ID }}

    timeout-minutes: 10

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
        id: go

      - name: Get dependencies
        run: |
          go mod download

      - name: Sweep to prepare
        run: |
          make sweep

  # run acceptance tests in a matrix with Terraform core versions
  test:
    name: Acceptance Test
    needs: [build, prepare]
    runs-on: ubuntu-latest

    env:
      PINGONE_TESTING_PROVIDER_VERSION: test
      PINGONE_CLIENT_ID: ${{ vars.PINGONE_PROD_EU_CLIENT_ID_CLIENT_SECRET_BASIC }}
      PINGONE_CLIENT_SECRET: ${{ secrets.PINGONE_PROD_EU_CLIENT_SECRET_CLIENT_SECRET_BASIC }}
      PINGONE_ENVIRONMENT_ID: ${{ vars.PINGONE_PROD_EU_ENVIRONMENT_ID }}
      PINGONE_REGION_CODE: "EU"
      PINGONE_LICENSE_ID: ${{ vars.PINGONE_PROD_EU_LICENSE_ID }}
      PINGONE_ORGANIZATION_ID: ${{ vars.PINGONE_PROD_EU_ORG_ID }}
      PINGONE_ORGANIZATION_NAME: ${{ vars.PINGONE_PROD_EU_ORG_NAME }}
      PINGONE_KEY_PKCS12_UNENCRYPTED: ${{ secrets.PINGONE_KEY_PKCS12_UNENCRYPTED }}
      PINGONE_KEY_PKCS12: ${{ secrets.PINGONE_KEY_PKCS12 }}
      PINGONE_KEY_PKCS12_PASSWORD:  ${{ secrets.PINGONE_KEY_PKCS12_PASSWORD }}
      PINGONE_KEY_PKCS10_CSR: ${{ secrets.PINGONE_KEY_PKCS10_CSR }}
      PINGONE_KEY_PEM_CSR: ${{ secrets.PINGONE_KEY_PEM_CSR }}
      PINGONE_KEY_PEM_CSR_RESPONSE: ${{ secrets.PINGONE_KEY_PEM_CSR_RESPONSE }}
      PINGONE_KEY_PKCS7_CERT: ${{ secrets.PINGONE_KEY_PKCS7_CERT }}
      PINGONE_KEY_PEM_CERT: ${{ secrets.PINGONE_KEY_PEM_CERT }}
      PINGONE_DOMAIN_CERTIFICATE_PEM: ${{ secrets.PINGONE_DOMAIN_CERTIFICATE_PEM }}
      PINGONE_DOMAIN_INTERMEDIATE_CERTIFICATE_PEM: ${{ secrets.PINGONE_DOMAIN_INTERMEDIATE_CERTIFICATE_PEM }}
      PINGONE_DOMAIN_KEY_PEM: ${{ secrets.PINGONE_DOMAIN_KEY_PEM }}
      PINGONE_VERIFIED_EMAIL_DOMAIN: ${{ secrets.PINGONE_VERIFIED_EMAIL_DOMAIN }}
      PINGONE_GOOGLE_JSON_KEY: ${{ secrets.PINGONE_GOOGLE_JSON_KEY }}
      PINGONE_GOOGLE_FIREBASE_CREDENTIALS: ${{ secrets.PINGONE_GOOGLE_JSON_KEY }}
      PINGONE_KEY_PKCS8: ${{ secrets.PINGONE_KEY_PKCS8 }}
      # Set skips
      PINGONE_TWILIO_TEST_SKIP: true
      PINGONE_SYNIVERSE_TEST_SKIP: true
      PINGONE_VERIFIED_EMAIL_DOMAIN_TEST_SKIP: true
      PINGONE_EMAIL_DOMAIN_TEST_SKIP: false
      PINGONE_CUSTOM_DOMAIN_TEST_SKIP: false

    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        # list whatever Terraform versions here you would like to support
        terraform: # We test the earliest supported (v1.4).  The latest supported is in the multi-region test
          - '1.4.*'
      max-parallel: 1

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
        id: go

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - name: Get dependencies
        run: |
          go mod download

      - name: TF acceptance tests
        timeout-minutes: 180
        run: |
          make testacc

  # run acceptance tests in a matrix with Terraform core versions
  # flaky flag set
  test-flaky:
    name: Acceptance Test (FLAKY)
    needs: [build, prepare]
    runs-on: ubuntu-latest
    env:
      TESTACC_FLAKY: true
      PINGONE_TESTING_PROVIDER_VERSION: test
      PINGONE_CLIENT_ID: ${{ vars.PINGONE_PROD_EU_CLIENT_ID_CLIENT_SECRET_BASIC }}
      PINGONE_CLIENT_SECRET: ${{ secrets.PINGONE_PROD_EU_CLIENT_SECRET_CLIENT_SECRET_BASIC }}
      PINGONE_ENVIRONMENT_ID: ${{ vars.PINGONE_PROD_EU_ENVIRONMENT_ID }}
      PINGONE_REGION_CODE: "EU"
      PINGONE_LICENSE_ID: ${{ vars.PINGONE_PROD_EU_LICENSE_ID }}
      PINGONE_ORGANIZATION_ID: ${{ vars.PINGONE_PROD_EU_ORG_ID }}
      PINGONE_ORGANIZATION_NAME: ${{ vars.PINGONE_PROD_EU_ORG_NAME }}
      PINGONE_KEY_PKCS12_UNENCRYPTED: ${{ secrets.PINGONE_KEY_PKCS12_UNENCRYPTED }}
      PINGONE_KEY_PKCS12: ${{ secrets.PINGONE_KEY_PKCS12 }}
      PINGONE_KEY_PKCS12_PASSWORD:  ${{ secrets.PINGONE_KEY_PKCS12_PASSWORD }}
      PINGONE_KEY_PKCS10_CSR: ${{ secrets.PINGONE_KEY_PKCS10_CSR }}
      PINGONE_KEY_PEM_CSR: ${{ secrets.PINGONE_KEY_PEM_CSR }}
      PINGONE_KEY_PEM_CSR_RESPONSE: ${{ secrets.PINGONE_KEY_PEM_CSR_RESPONSE }}
      PINGONE_KEY_PKCS7_CERT: ${{ secrets.PINGONE_KEY_PKCS7_CERT }}
      PINGONE_KEY_PEM_CERT: ${{ secrets.PINGONE_KEY_PEM_CERT }}
      PINGONE_DOMAIN_CERTIFICATE_PEM: ${{ secrets.PINGONE_DOMAIN_CERTIFICATE_PEM }}
      PINGONE_DOMAIN_INTERMEDIATE_CERTIFICATE_PEM: ${{ secrets.PINGONE_DOMAIN_INTERMEDIATE_CERTIFICATE_PEM }}
      PINGONE_DOMAIN_KEY_PEM: ${{ secrets.PINGONE_DOMAIN_KEY_PEM }}
      PINGONE_VERIFIED_EMAIL_DOMAIN: ${{ secrets.PINGONE_VERIFIED_EMAIL_DOMAIN }}
      PINGONE_GOOGLE_JSON_KEY: ${{ secrets.PINGONE_GOOGLE_JSON_KEY }}
      PINGONE_GOOGLE_FIREBASE_CREDENTIALS: ${{ secrets.PINGONE_GOOGLE_JSON_KEY }}
      PINGONE_KEY_PKCS8: ${{ secrets.PINGONE_KEY_PKCS8 }}
      PINGONE_TWILIO_TEST_SKIP: true
      PINGONE_SYNIVERSE_TEST_SKIP: true

    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        # list whatever Terraform versions here you would like to support
        terraform: # We test the earliest supported (v1.4).  The latest supported is in the multi-region test
          - '1.4.*'
      max-parallel: 1

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
        id: go

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - name: Get dependencies
        run: |
          go mod download

      - name: TF acceptance tests (flaky)
        id: tf-flaky-acc-test
        continue-on-error: true
        timeout-minutes: 180
        run: |
          make testacc

      - name: Check flaky step status
        run: |
         echo "ACCTEST-FLAKY step outcome: ${{ steps.tf-flaky-acc-test }}"
          if [[ "${{ steps.tf-flaky-acc-test }}" == "failure" ]]; then
           echo "Flaky acceptance tests failed: Continuing..."
         fi

  test-access-token:
    name: Acceptance Test (Access Token)
    needs: [build, prepare]
    runs-on: ubuntu-latest

    env:
      TESTACC_ACCESS_TOKEN_AUTH: true
      PINGONE_TESTING_PROVIDER_VERSION: test
      PINGONE_REGION_CODE: "EU"
      PINGONE_LICENSE_ID: ${{ vars.PINGONE_PROD_EU_LICENSE_ID }}
      PINGONE_ORGANIZATION_ID: ${{ vars.PINGONE_PROD_EU_ORG_ID }}

    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        terraform: # Keep Terraform version aligned with this workflow's compatibility test
          - '1.4.*'
      max-parallel: 1

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
        id: go

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false

      - name: Get dependencies
        run: |
          go mod download

      - name: Install Ping CLI
        run: go install github.com/pingidentity/pingcli@latest
        continue-on-error: false

      - name: Retrieve access token
        env:
          PINGCLI_PINGONE_CLIENT_CREDENTIALS_CLIENT_ID: ${{ vars.PINGONE_PROD_EU_CLIENT_ID_CLIENT_SECRET_BASIC }}
          PINGCLI_PINGONE_CLIENT_CREDENTIALS_CLIENT_SECRET: ${{ secrets.PINGONE_PROD_EU_CLIENT_SECRET_CLIENT_SECRET_BASIC }}
          PINGCLI_PINGONE_ENVIRONMENT_ID: ${{ vars.PINGONE_PROD_EU_ENVIRONMENT_ID }}
          PINGCLI_PINGONE_REGION_CODE: "EU"
          PINGCLI_LOGIN_STORAGE_TYPE: file_system
        run: |
          pingcli login -c

          TOKEN_FILE=$(ls -t "$HOME/.pingcli/credentials"/token-*__pingone_client_credentials_default.json | head -n 1)
          if [ -z "$TOKEN_FILE" ] || [ ! -f "$TOKEN_FILE" ]; then
            echo "Unable to locate pingcli token file" >&2
            exit 1
          fi

          ACCESS_TOKEN=$(jq -r '.access_token // empty' "$TOKEN_FILE")
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "No access_token found in pingcli token file" >&2
            exit 1
          fi

          echo "PINGONE_API_ACCESS_TOKEN=$ACCESS_TOKEN" >> "$GITHUB_ENV"

      - name: TF acceptance tests (access token auth)
        timeout-minutes: 20
        run: |
          TF_ACC=1 go test -v -timeout 300s -run '^TestAccDavinciVariable_AccessTokenAuth_WithEnvironment$' ./internal/service/davinci

  cleanup:
    name: Acceptance Test
    needs: [test, test-flaky, test-access-token]
    runs-on: ubuntu-latest

    env:
      PINGONE_TESTING_PROVIDER_VERSION: test
      PINGONE_CLIENT_ID: ${{ vars.PINGONE_PROD_EU_CLIENT_ID_CLIENT_SECRET_BASIC }}
      PINGONE_CLIENT_SECRET: ${{ secrets.PINGONE_PROD_EU_CLIENT_SECRET_CLIENT_SECRET_BASIC }}
      PINGONE_ENVIRONMENT_ID: ${{ vars.PINGONE_PROD_EU_ENVIRONMENT_ID }}
      PINGONE_REGION_CODE: "EU"
      PINGONE_LICENSE_ID: ${{ vars.PINGONE_PROD_EU_LICENSE_ID }}
      PINGONE_ORGANIZATION_ID: ${{ vars.PINGONE_PROD_EU_ORG_ID }}

    timeout-minutes: 5

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
        id: go

      - name: Get dependencies
        run: |
          go mod download

      - name: Sweep to cleanup
        run: |
          make sweep

  onfailure:
    if: ${{ failure() && github.event_name == 'schedule' }}
    needs: [build, prepare, test, test-flaky, test-access-token, cleanup]
    name: Send failure webhook
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl --silent --request POST "${{ secrets.FAILURE_WEBHOOK_URL }}" \
          --header 'Accept: application/json' \
          --header 'Content-Type: text/plain' \
          --data-raw '{
              "WorkflowName": "${{ github.workflow }}",
              "WorkflowURL": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "RepoName" : "${{ github.repository }}",
          }'